name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore TyriaPlanner.Hud/TyriaPlanner.Hud.csproj
      - run: dotnet build TyriaPlanner.Hud/TyriaPlanner.Hud.csproj -c Release --no-restore
      - uses: actions/upload-artifact@v4
        with:
          name: TyriaPlanner.Hud
          path: TyriaPlanner.Hud/bin/Release/TyriaPlanner.Hud.bhm
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TyriaPlanner.Hud/bin/Release/TyriaPlanner.Hud.bhm
